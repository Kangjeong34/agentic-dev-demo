<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buddy live</title>
    <style>
      :root {
        --bg: #d6e4f0;
        --panel: #ffffff;
        --line: #b9c9dc;
        --accent: #2f6fb0;
        --accent-d: #1f4e80;
        --me: #c9e7ff;
        --them: #eef1f4;
        --dim: #7a8aa0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
        background: var(--bg);
        color: #16263a;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app { width: min(860px, 96vw); height: min(620px, 94vh); }

      /* 로그인 */
      .login {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 32px;
        max-width: 420px;
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(31, 78, 128, 0.18);
      }
      .login h1 { color: var(--accent-d); margin: 0 0 8px; }
      .login form { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
      .login input, .login button { padding: 10px; border-radius: 8px; border: 1px solid var(--line); font-size: 14px; }
      .login button { background: var(--accent); color: #fff; border: none; cursor: pointer; }
      .login .tip { color: var(--dim); font-size: 13px; }
      code { background: #eef3f9; padding: 1px 5px; border-radius: 4px; }

      /* 메신저 */
      .messenger {
        height: 100%;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(31, 78, 128, 0.18);
      }
      .app-head {
        background: linear-gradient(var(--accent), var(--accent-d));
        color: #fff;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
      }
      .app-head .dot { font-weight: 600; font-size: 13px; }
      .dot.on { color: #7CFC00; }
      .dot.off { color: #cdd7e3; }
      .body { flex: 1; display: flex; min-height: 0; }

      .sidebar {
        width: 240px;
        border-right: 1px solid var(--line);
        padding: 12px;
        overflow-y: auto;
        background: #f6f9fc;
      }
      .add { display: flex; gap: 6px; margin-bottom: 12px; }
      .add input { flex: 1; padding: 7px; border: 1px solid var(--line); border-radius: 6px; }
      .add button { width: 34px; border: none; background: var(--accent); color: #fff; border-radius: 6px; cursor: pointer; font-size: 16px; }
      .section-title { font-size: 12px; color: var(--dim); margin: 10px 2px 4px; font-weight: 700; }
      .buddies, .requests { list-style: none; padding: 0; margin: 0; }
      .buddy {
        display: flex; align-items: center; gap: 7px;
        padding: 8px; border-radius: 7px; cursor: pointer;
      }
      .buddy:hover { background: #e7eef7; }
      .buddy.selected { background: #dcebfb; }
      .buddy .dot.on { color: #1faf3a; }
      .buddy .dot.off { color: #b6c1d0; }
      .buddy .name { flex: 1; }
      .badge { background: #e23b3b; color: #fff; font-size: 11px; border-radius: 10px; padding: 1px 7px; }
      .buddies .empty { color: var(--dim); font-size: 13px; padding: 8px; list-style: none; }
      .request { display: flex; align-items: center; gap: 6px; padding: 6px 4px; }
      .request .name { flex: 1; }
      .request button { font-size: 12px; padding: 3px 8px; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; background: #fff; }
      .request button[data-action="accept"] { background: var(--accent); color: #fff; border: none; }

      .conversation { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .conversation.empty { align-items: center; justify-content: center; }
      .conversation .hint { color: var(--dim); }
      .conv-head { padding: 12px 16px; border-bottom: 1px solid var(--line); font-weight: 700; }
      .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
      .msg { display: flex; }
      .msg.me { justify-content: flex-end; }
      .msg .bubble { max-width: 70%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
      .msg.them .bubble { background: var(--them); border-top-left-radius: 4px; }
      .msg.me .bubble { background: var(--me); border-top-right-radius: 4px; }
      .composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); }
      .composer input { flex: 1; padding: 10px; border: 1px solid var(--line); border-radius: 8px; }
      .composer button { padding: 10px 18px; border: none; background: var(--accent); color: #fff; border-radius: 8px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
